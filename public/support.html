        body {

        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {

                transform: translateY(10px);

        details>summary {

        details>summary::-webkit-details-marker {

        details[open] summary~* {

        // --- Initialization ---
        async function init() {
            try {
                const configDoc = await getDoc(doc(db, "settings", "global_config"));
                if (configDoc.exists()) {
                    globalConfig = { ...globalConfig, ...configDoc.data() };
                } else {
                    await setDoc(doc(db, "settings", "global_config"), globalConfig);
                }
            } catch (e) {
                console.log("Config load error:", e);
            }

            renderLauncherApps();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                updateAuthUI();
                const currentView = document.getElementById('view-id')?.value;
                if (!currentView) renderHome();
            });
        }

        // --- Helper: Enhanced SEO Update ---
        window.updateSEO = (title, description, image = null) => {
            document.title = title;

            // Standard Meta
            updateMeta("description", description);

            // Open Graph
            updateMeta("og:title", title);
            updateMeta("og:description", description);
            updateMeta("og:url", window.location.href);
            if (image) updateMeta("og:image", image);
        };

        function updateMeta(name, content) {
            let element = document.querySelector(`meta[name="${name}"]`) || document.querySelector(`meta[property="${name}"]`);
            if (!element) {
                element = document.createElement('meta');
                if (name.startsWith('og:')) element.setAttribute('property', name);
                else element.setAttribute('name', name);
                document.head.appendChild(element);
            }
            element.setAttribute('content', content);
        }

        // --- Waffle Menu Logic ---
        window.toggleAppDrawer = (e) => {
            e.stopPropagation();
            const drawer = document.getElementById('appDrawer');
            drawer.classList.toggle('hidden');
        };

        window.closeAppDrawer = (e) => {
            const drawer = document.getElementById('appDrawer');
            if (!drawer.contains(e.target)) {
                drawer.classList.add('hidden');
            }
        };

        function renderLauncherApps() {
            const grid = document.getElementById('launcherGrid');
            if (!grid) return;

            if (globalConfig.launcherApps && globalConfig.launcherApps.length > 0) {
                grid.innerHTML = globalConfig.launcherApps.map(app => `
                    <a href="${app.url}" target="_blank" class="app-item flex flex-col items-center justify-center p-4 rounded-xl transition-colors cursor-pointer group text-center h-24">
                        <img src="${app.icon || 'https://via.placeholder.com/40'}" class="w-10 h-10 mb-2 rounded-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}'">

                    </a>
                `).join('');
            } else {
                grid.innerHTML = '<div class="col-span-3 text-center text-xs">No apps configured</div>';
            }
        }

                    <button onclick="renderLogin()" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 font-medium text-sm shadow-sm transition-all hover:shadow-md">Sign In</button>
                `;
            }
        }

        window.logout = () => signOut(auth).then(() => renderHome());

        // --- Modal Logic ---
        window.closeModal = () => {
            const modal = document.getElementById('modal-container');
            modal.classList.add('hidden');
            modal.innerHTML = ''; // Clear content
        };

        window.openLegal = (type) => {
            const content = legalContent[type];
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col max-h-[90vh]">
                    <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <h2 class="text-xl font-bold google-font text-gray-800">${content.title}</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700"><i class="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div class="p-6 overflow-y-auto">
                        ${content.body}
                        <p class="text-xs text-gray-400 mt-8 pt-4 border-t border-gray-100">Last updated: ${new Date().toLocaleDateString()}</p>
                    </div>
                    <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 text-right">
                        <button onclick="closeModal()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-700">Close</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.openFeedback = () => {
            const appOptions = globalConfig.apps.map(a => `<option value="${a}">${a}</option>`).join('');

            modal.innerHTML = `

                        </form>

             `;

                                    <div class="flex-1">
                                        <div class="flex justify-between items-start">
                                            <h4 class="font-bold text-gray-800 text-sm">${f.app} <span class="text-gray-400 font-normal">by ${f.name || 'Anonymous'}</span></h4>
                                            <span class="text-xs text-gray-400">${f.timestamp ? new Date(f.timestamp.seconds * 1000).toLocaleDateString() : ''}</span>
                                        </div>
                                        <p class="text-gray-600 text-sm mt-1">"${f.message}"</p>
                                        <p class="text-xs text-blue-500 mt-1">${f.email}</p>
                                    </div>
                                    <button onclick="deleteFeedback('${f.id}')" class="text-gray-400 hover:text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Settings Tab -->
                    <div class="max-w-7xl mx-auto px-4 py-8 hidden fade-in" id="tab-settings">
                        <div class="grid lg:grid-cols-2 gap-8">
                            <!-- Products -->
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 class="font-bold text-lg mb-4 text-gray-800 flex items-center gap-2"><i class="fa-solid fa-list-check text-blue-500"></i> Support Form: Products</h3>
                                <div class="flex gap-2 mb-4"><input type="text" id="newAppInput" placeholder="New Product Name..." class="flex-1 border p-2 rounded text-sm outline-none focus:border-blue-500"><button onclick="addItem('apps', 'newAppInput')" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 font-bold"><i class="fa-solid fa-plus"></i></button></div>
                                <ul class="space-y-2 max-h-60 overflow-y-auto">${globalConfig.apps.map(item => `<li class="flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-100 text-sm"><span class="text-gray-700 font-medium">${item}</span><button onclick="removeItem('apps', '${item}')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></li>`).join('')}</ul>
                            </div>
                            <!-- Issues -->
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 class="font-bold text-lg mb-4 text-gray-800 flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation text-orange-500"></i> Support Form: Issue Types</h3>
                                <div class="flex gap-2 mb-4"><input type="text" id="newServiceInput" placeholder="New Issue Type..." class="flex-1 border p-2 rounded text-sm outline-none focus:border-blue-500"><button onclick="addItem('services', 'newServiceInput')" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 font-bold"><i class="fa-solid fa-plus"></i></button></div>
                                <ul class="space-y-2 max-h-60 overflow-y-auto">${globalConfig.services.map(item => `<li class="flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-100 text-sm"><span class="text-gray-700 font-medium">${item}</span><button onclick="removeItem('services', '${item}')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></li>`).join('')}</ul>
                            </div>
                            <!-- App Launcher -->
                            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-purple-500">
                                <div class="flex justify-between items-start mb-6"><div><h3 class="font-bold text-lg text-gray-800 flex items-center gap-2"><i class="fa-solid fa-grip text-purple-600"></i> App Launcher (9-Dots Menu)</h3><p class="text-xs text-gray-500">Manage apps that appear in the top-right waffle menu.</p></div></div>
                                <div class="grid md:grid-cols-4 gap-3 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    <div class="md:col-span-1"><label class="text-xs font-bold text-gray-400 uppercase">Name</label><input type="text" id="launcherName" placeholder="e.g. Portfolio" class="w-full border p-2 rounded text-sm mt-1 outline-none focus:border-purple-500"></div>
                                    <div class="md:col-span-1"><label class="text-xs font-bold text-gray-400 uppercase">Website Link</label><input type="text" id="launcherUrl" placeholder="https://..." class="w-full border p-2 rounded text-sm mt-1 outline-none focus:border-purple-500"></div>
                                    <div class="md:col-span-1"><label class="text-xs font-bold text-gray-400 uppercase">Icon Image Link</label><input type="text" id="launcherIcon" placeholder="https://image.png" class="w-full border p-2 rounded text-sm mt-1 outline-none focus:border-purple-500"></div>
                                    <div class="md:col-span-1 flex items-end"><button onclick="addLauncherApp()" class="w-full bg-purple-600 text-white px-4 py-2 rounded text-sm hover:bg-purple-700 font-bold transition-colors">Add App</button></div>
                                </div>
                                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">${(globalConfig.launcherApps || []).map((app, index) => `<div class="relative bg-white border border-gray-200 rounded-xl p-4 flex flex-col items-center text-center hover:shadow-md transition group"><button onclick="removeLauncherApp(${index})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-times-circle"></i></button><img src="${app.icon}" class="w-10 h-10 mb-2 rounded-full object-cover shadow-sm bg-gray-100" onerror="this.src='https://ui-avatars.com/api/?name=${app.name}'"><h4 class="font-bold text-sm text-gray-800 mb-1">${app.name}</h4><a href="${app.url}" target="_blank" class="text-xs text-blue-500 hover:underline truncate w-full px-2">${app.url}</a></div>`).join('')}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Helper Logic (Same as before) ---
        function getStatusClass(status) { if (status === 'Resolved') return 'bg-green-100 text-green-800'; if (status === 'In Progress') return 'bg-blue-100 text-blue-800'; return 'bg-yellow-100 text-yellow-800'; }
        window.updateTicketStatus = async (id, newStatus) => { try { await updateDoc(doc(db, "support_tickets", id), { status: newStatus }); } catch (e) { alert("Error: " + e.message); } };
        window.saveAdminReply = async (id) => { const reply = document.getElementById(`reply-${id}`).value; try { await updateDoc(doc(db, "support_tickets", id), { adminReply: reply }); alert("Reply Sent!"); } catch (e) { alert("Error: " + e.message); } };

        window.switchTab = (tab) => {
            ['tickets', 'settings', 'feedbacks'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).className = "px-6 py-2 rounded-md hover:bg-white/50 text-gray-600 font-bold transition-all";
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).className = "px-6 py-2 rounded-md bg-white shadow-sm text-blue-700 font-bold transition-all";
        };

        window.deleteTicket = async (id) => { if (confirm('Delete this ticket permanently?')) { await deleteDoc(doc(db, "support_tickets", id)); renderAdminPanel(); } };
        window.deleteFeedback = async (id) => { if (confirm('Delete this feedback?')) { await deleteDoc(doc(db, "feedbacks", id)); renderAdminPanel(); setTimeout(() => switchTab('feedbacks'), 100); } };

        window.addItem = async (field, inputId) => { const val = document.getElementById(inputId).value.trim(); if (!val) return; await updateDoc(doc(db, "settings", "global_config"), { [field]: arrayUnion(val) }); globalConfig[field].push(val); renderAdminPanel(); setTimeout(() => switchTab('settings'), 50); };
        window.removeItem = async (field, value) => { if (!confirm(`Remove ${value}?`)) return; await updateDoc(doc(db, "settings", "global_config"), { [field]: arrayRemove(value) }); globalConfig[field] = globalConfig[field].filter(i => i !== value); renderAdminPanel(); setTimeout(() => switchTab('settings'), 50); };
        window.addLauncherApp = async () => {
            const name = document.getElementById('launcherName').value.trim(); const url = document.getElementById('launcherUrl').value.trim(); const icon = document.getElementById('launcherIcon').value.trim();
            if (!name || !url) { alert("Name and URL are required!"); return; }
            const newApp = { name, url, icon }; const currentApps = globalConfig.launcherApps || []; const newAppsList = [...currentApps, newApp];
            try { await updateDoc(doc(db, "settings", "global_config"), { launcherApps: newAppsList }); globalConfig.launcherApps = newAppsList; renderAdminPanel(); renderLauncherApps(); setTimeout(() => switchTab('settings'), 50); } catch (e) { alert("Error adding app: " + e.message); }
        };
        window.removeLauncherApp = async (index) => {
            if (!confirm("Remove this app from launcher?")) return;
            const currentApps = globalConfig.launcherApps || []; const newAppsList = currentApps.filter((_, i) => i !== index);
            try { await updateDoc(doc(db, "settings", "global_config"), { launcherApps: newAppsList }); globalConfig.launcherApps = newAppsList; renderAdminPanel(); renderLauncherApps(); setTimeout(() => switchTab('settings'), 50); } catch (e) { alert("Error removing app: " + e.message); }
        };

        // Form Logic
        function generateFAQItem(question, answer) {
            return `<details class="group py-2 border-b border-gray-100 last:border-0 px-2 cursor-pointer hover:bg-gray-50 rounded transition-colors"><summary class="flex justify-between items-center font-medium text-sm text-gray-700 hover:text-blue-600"><span>${question}</span><span class="text-gray-400 transition group-open:rotate-180"><i class="fa-solid fa-chevron-down text-xs"></i></span></summary><div class="text-gray-500 text-xs mt-2 pl-2 leading-relaxed">${answer}</div></details>`;
        }
        function setupFormLogic() {
            const form = document.getElementById('supportForm');
            if (!form) return;
            const imageInput = document.getElementById('formImage');
            let base64Image = null;
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 500000) { alert("File too big! Please keep it under 500KB."); imageInput.value = ""; return; }
                    const reader = new FileReader();
                    reader.onloadend = () => { base64Image = reader.result; document.getElementById('imagePreview').classList.remove('hidden'); document.getElementById('dropzone').classList.add('border-green-500', 'bg-green-50'); };
                    reader.readAsDataURL(file);
                }
            });
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); const btn = form.querySelector('button'); const originalText = btn.innerText; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Processing...';
                const newTicketId = `MB-${Math.floor(1000 + Math.random() * 9000)}`;
                try {
                    await addDoc(collection(db, "support_tickets"), { name: document.getElementById('formName').value, email: document.getElementById('formEmail').value, app: document.getElementById('formApp').value, service: document.getElementById('formService').value, message: document.getElementById('formMessage').value, image: base64Image, status: 'Pending', adminReply: '', timestamp: serverTimestamp(), ticketId: newTicketId });
                    form.parentElement.classList.add('hidden'); document.getElementById('successMessage').parentElement.classList.remove('hidden'); document.getElementById('generatedTicketId').innerText = newTicketId; document.getElementById('successMessage').classList.remove('hidden');
                } catch (err) { alert("Submission failed. Check internet connection."); console.error(err); btn.disabled = false; btn.innerText = originalText; }
            });
        }

        init();
    </script>
</body>

</html>
