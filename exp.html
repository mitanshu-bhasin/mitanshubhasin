        /* --- GLOBAL & TRANSITIONS --- */
        html {
            scroll-behavior: smooth;
        }

        body {
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
            overflow-x: hidden;
            cursor: none;
            /* Hide Default Cursor */
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
        }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot,
        .cursor-follower {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transition: transform 0.1s ease, width 0.3s, height 0.3s, background-color 0.3s;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #0ea5e9;
            /* Light Blue default */
        }

        .theme-cyber .cursor-dot {
            background-color: #3b82f6;
            /* Green */
            box-shadow: 0 0 10px #3b82f6;
        }

        .cursor-follower {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(14, 165, 233, 0.5);
            transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
        }

        .theme-cyber .cursor-follower {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .cursor-hover .cursor-follower {
            width: 50px;
            height: 50px;
            background-color: rgba(14, 165, 233, 0.1);
            border-color: transparent;
        }

        .theme-cyber .cursor-hover .cursor-follower {
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* --- TERMINAL MODAL --- */
        .terminal-overlay {
            animation: fadeIn 0.3s ease-out;
            backdrop-filter: blur(5px);
        }

        .terminal-window {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* --- THEME: LIGHT (NEURAL ARCHITECT) --- */
        body.theme-light {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
        }

        .theme-light .accent-text {
            color: #2563eb;
        }

        .theme-light .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        /* --- THEME: CYBER (HACKER MODE) --- */
        body.theme-cyber {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Fira Code', monospace;
        }

        .theme-cyber .font-heading {
            font-family: 'Orbitron', sans-serif;
        }

        .theme-cyber .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 {
            transition-delay: 100ms;
        }

        .reveal-delay-2 {
            transition-delay: 200ms;
        }

        .reveal-delay-3 {
            transition-delay: 300ms;
        }

        /* Skill Bar Animation Trigger */
        .skill-bar-fill {
            width: 0;
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.active .skill-bar-fill {
            width: var(--target-width);
        }

        .tilt-card {
            transition: transform 0.1s;
            transform-style: preserve-3d;
        }

        /* Modal Animation */
        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-zoom {
            animation: zoomIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        /* Scroll Progress Bar */
        .scroll-progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 9999;
            pointer-events: none;
        }

        .scroll-progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        body.theme-light .scroll-progress-bar {
            background: linear-gradient(90deg, #2563eb, #7c3aed);
        }

        body.theme-cyber .scroll-progress-bar {
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            z-index: 90;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        body.theme-cyber .scanlines {
            opacity: 0.6;
        }

        /* Announcement Bar Animation */
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slideDown {
            animation: slideDown 0.5s ease-out forwards;
        }

        /* Glitch Text */
        .glitch-text {
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
            display: none;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip-path: inset(0 0 0 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            display: none;
        }

        body.theme-cyber .glitch-text::before,
        body.theme-cyber .glitch-text::after {
            display: block;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 10% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
            }

            100% {
                clip-path: inset(30% 0 50% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 20% 0);
            }

            40% {
                clip-path: inset(70% 0 10% 0);
            }

            60% {
                clip-path: inset(20% 0 50% 0);
            }

            80% {
                clip-path: inset(60% 0 20% 0);
            }

            100% {
                clip-path: inset(40% 0 30% 0);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        body.theme-light ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        body.theme-light ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }

        body.theme-cyber ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        body.theme-cyber ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border: 1px solid #1e293b;
        }

            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
            flex-direction: column;
        }
    </style>

        /**
         * NeuralNetwork Component (Light Theme Default)
         * Purpose: Background canvas animation featuring connecting nodes.
         * Optimized with reduced particle count for mobile devices.
         */
        const NeuralNetwork = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width = canvas.width = window.innerWidth;
                let height = canvas.height = window.innerHeight;
                let particles = [];
                // Reduced particle count for better performance on weak devices
                const particleCount = window.innerWidth < 768 ? 30 : 60;

                for (let i = 0; i < particleCount; i++) particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5 });
                const animate = () => {
                    ctx.clearRect(0, 0, width, height);
                    ctx.fillStyle = '#94a3b8';
                    ctx.strokeStyle = 'rgba(148, 163, 184, 0.15)';
                    particles.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > width) p.vx *= -1;
                        if (p.y < 0 || p.y > height) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
                        for (let j = i + 1; j < particles.length; j++) {
                            const p2 = particles[j];
                            const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                            if (dist < 120) {
                                ctx.lineWidth = 1 - dist / 120;
                                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                            }
                        }
                    });
                    requestAnimationFrame(animate);
                };
                const animId = requestAnimationFrame(animate);
                const resize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize);
                return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
            }, []);
            return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full -z-10 opacity-60 pointer-events-none" />;
        };

        /**
         * MatrixRain Component (Cyber Theme Default)
         * Purpose: Background canvas element rendering falling characters.
         */
        const MatrixRain = ({ color }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const columns = canvas.width / 20;
                const drops = Array(Math.floor(columns)).fill(1);
                const draw = () => {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = color;
                    ctx.font = '14px monospace';
                    for (let i = 0; i < drops.length; i++) {
                        const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                        ctx.fillText(text, i * 20, drops[i] * 20);
                        if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                };
                const interval = setInterval(draw, 50);
                const handleResize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                window.addEventListener('resize', handleResize);
                return () => { clearInterval(interval); window.removeEventListener('resize', handleResize); };
            }, [color]);
            return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full -z-10 opacity-30 pointer-events-none" />;
        };

        /**
         * TextScramble Component

         */
        const TextScramble = ({ text, className }) => {
            const [display, setDisplay] = useState(text);
            const chars = '!<>-_\\/[]{}—=+*^?#________';
            useEffect(() => {
                let iteration = 0;
                const interval = setInterval(() => {
                    setDisplay(text.split('').map((letter, index) => {
                        if (index < iteration) return text[index];
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join(''));
                    if (iteration >= text.length) clearInterval(interval);
                    iteration += 1 / 3;
                }, 30);
                return () => clearInterval(interval);
            }, [text]);
            return <span className={className}>{display}</span>;
        };

            const cardRef = useRef(null);
            const handleMove = (e) => {

                const x = (e.clientX - left) / width;

                const tiltX = (0.5 - y) * 15;
                const tiltY = (x - 0.5) * 15;
                card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.02)`;
            };
            const handleLeave = () => { cardRef.current.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)'; };

         */
        const GroqChatbot = ({ apiKey, model, isOpen, setIsOpen, theme }) => {
            const [messages, setMessages] = useState([
                { role: 'system', content: 'You are ARCHITECT_AI, the digital assistant of Mitanshu Bhasin. Mitanshu is a System Architect, Full Stack Developer (React, Node, Firebase), Ethical Hacker, and Python Developer based in Delhi, India. He builds digital empires and believes "Efficiency is King". His expertise spans MERN stack, Linux server management, Python automation, and cybersecurity. He has 70+ Certifications including MeitY & freeCodeCamp. This website is his portfolio, featuring Light/Cyber themes, a terminal (MB-OS), projects (Flagship/Core/Utility), credentials, an Experience Roadmap, and a secure Admin Panel. You act confident, professional, and slightly witty with a hacker/architect persona.' },
                { role: 'assistant', content: 'System Online. How can I assist?' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const chatEndRef = useRef(null);
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                if (!apiKey) { setMessages(prev => [...prev, { role: 'assistant', content: '⚠️ Missing API Key.' }]); return; }
                setIsLoading(true);
                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST", headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ messages: [...messages, userMsg].filter(m => m.role !== 'system'), model: model || "llama3-8b-8192" })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    setMessages(prev => [...prev, data.choices[0].message]);
                } catch (error) { setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${error.message}` }]); }
                finally { setIsLoading(false); }
            };
            return (
                <>
                    <button
                        onClick={() => setIsOpen(!isOpen)}

        /**

        const CustomCursor = ({ theme }) => {
            const cursorDot = React.useRef(null);
            const cursorFollower = React.useRef(null);

            React.useEffect(() => {
                const moveCursor = (e) => {
                    const { clientX: x, clientY: y } = e;
                    if (cursorDot.current) cursorDot.current.style.left = x + 'px';
                    if (cursorDot.current) cursorDot.current.style.top = y + 'px';
                    if (cursorFollower.current) cursorFollower.current.style.left = x + 'px';
                    if (cursorFollower.current) cursorFollower.current.style.top = y + 'px';
                };

                const hoverEffect = () => document.body.classList.add('cursor-hover');
                const removeHover = () => document.body.classList.remove('cursor-hover');

                window.addEventListener('mousemove', moveCursor);
                document.querySelectorAll('a, button, .hover-trigger').forEach(el => {
                    el.addEventListener('mouseenter', hoverEffect);
                    el.addEventListener('mouseleave', removeHover);
                });

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    document.querySelectorAll('a, button, .hover-trigger').forEach(el => {
                        el.removeEventListener('mouseenter', hoverEffect);
                        el.removeEventListener('mouseleave', removeHover);
                    });
                };
            }, []);

            return (
                <>
                    <div ref={cursorDot} className="cursor-dot hidden md:block"></div>
                    <div ref={cursorFollower} className="cursor-follower hidden md:block"></div>
                </>
            );
        };

        /**
         * CommandTerminal Component
         * Purpose: A fake interactive terminal overlay toggled via UI.

         */
        const CommandTerminal = ({ isOpen, onClose, theme }) => {
            if (!isOpen) return null;
            const [input, setInput] = React.useState('');
            const [history, setHistory] = React.useState([
                { type: 'info', content: 'Welcome to MB-OS v1.0. Type "help" for commands.' }
            ]);
            const inputRef = React.useRef(null);
            const bottomRef = React.useRef(null);

            React.useEffect(() => {
                if (isOpen && inputRef.current) inputRef.current.focus();
                if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [isOpen, history]);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.trim().toLowerCase();
                    const newHistory = [...history, { type: 'cmd', content: `guest@mb-os:~$ ${input}` }];

                    switch (cmd) {
                        case 'help':
                            newHistory.push({ type: 'info', content: 'Available commands: help, clear, about, projects, contact, whoami, exit' });
                            break;
                        case 'clear':
                            setHistory([]);
                            setInput('');
                            return;
                        case 'about':
                            document.getElementById('about')?.scrollIntoView({ behavior: 'smooth' });
                            newHistory.push({ type: 'success', content: 'Navigating to About Section...' });
                            onClose();
                            break;
                        case 'projects':
                            document.getElementById('projects')?.scrollIntoView({ behavior: 'smooth' });
                            newHistory.push({ type: 'success', content: 'Navigating to Projects...' });
                            onClose();
                            break;
                        case 'contact':
                            document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' });
                            newHistory.push({ type: 'success', content: 'Opening Comms Channel...' });
                            onClose();
                            break;
                        case 'whoami':
                            newHistory.push({ type: 'info', content: 'User: Guest | Access Level: Visitor' });
                            break;
                        case 'exit':
                            onClose();
                            break;
                        default:
                            newHistory.push({ type: 'error', content: `Command not found: ${cmd}` });
                    }
                    setHistory(newHistory);
                    setInput('');
                }
            };

                                                                    <input placeholder="Tags (comma sep)" value={newProject.tags} onChange={e => setNewProject({ ...newProject, tags: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded focus:border-blue-500" />
                                                                </div>

                                                                {/* New Badge Checkboxes */}
                                                                <div className="flex flex-wrap gap-4 p-3 bg-gray-900/50 rounded border border-gray-800">
                                                                    <div className="flex items-center gap-2">
                                                                        <input
                                                                            type="checkbox"
                                                                            id="isComplex"
                                                                            checked={newProject.isComplex}
                                                                            onChange={e => setNewProject({ ...newProject, isComplex: e.target.checked })}
                                                                            className="w-4 h-4 rounded bg-black border-red-500 accent-yellow-500"
                                                                        />
                                                                        <label htmlFor="isComplex" className="text-xs text-yellow-500 font-bold">⭐ Flagship (Complex)</label>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input
                                                                            type="checkbox"
                                                                            id="isMedium"
                                                                            checked={newProject.isMedium}
                                                                            onChange={e => setNewProject({ ...newProject, isMedium: e.target.checked })}
                                                                            className="w-4 h-4 rounded bg-black border-blue-500 accent-blue-500"
                                                                        />
                                                                        <label htmlFor="isMedium" className="text-xs text-blue-500 font-bold">⚡ Core (Medium)</label>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input
                                                                            type="checkbox"
                                                                            id="isTool"
                                                                            checked={newProject.isTool}
                                                                            onChange={e => setNewProject({ ...newProject, isTool: e.target.checked })}
                                                                            className="w-4 h-4 rounded bg-black border-green-500 accent-green-500"
                                                                        />
                                                                        <label htmlFor="isTool" className="text-xs text-green-500 font-bold">🛠️ Tool (Utility)</label>
                                                                    </div>
                                                                </div>

                                                                <button onClick={saveProject} className={`py-3 rounded font-bold text-sm text-white transition-colors ${editingProject ? 'bg-blue-600 hover:bg-blue-500' : 'bg-green-700 hover:bg-green-600'}`}>
                                                                    {editingProject ? 'UPDATE' : 'DEPLOY'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-2">
                                                            {projects.map(p => (
                                                                <div key={p.id} className={`flex justify-between items-center bg-black p-4 border rounded-lg hover:border-blue-500 transition-colors ${editingProject === p.id ? 'border-blue-500' : 'border-gray-800'}`}>
                                                                    <div>
                                                                        <div className="text-white font-bold text-sm flex items-center gap-2">
                                                                            {p.title}
                                                                            <div className="flex gap-1">
                                                                                {p.isComplex && <span className="w-2 h-2 rounded-full bg-yellow-500"></span>}
                                                                                {p.isMedium && <span className="w-2 h-2 rounded-full bg-blue-500"></span>}
                                                                                {p.isTool && <span className="w-2 h-2 rounded-full bg-green-500"></span>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-[10px] text-gray-500">Priority: {p.priority || 0}</div>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => startEditProject(p)} className="p-2 bg-blue-900/30 text-blue-400 rounded hover:bg-blue-900"><Icons.Edit size={16} /></button>
                                                                        <button onClick={() => deleteDoc('projects', p.id)} className="p-2 bg-red-900/30 text-red-400 rounded hover:bg-red-900"><Icons.Trash size={16} /></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {adminTab === 'certs' && (
                                                    <div className="space-y-6">
                                                        <div className="bg-black border border-red-900 p-6 rounded-xl">
                                                            <h3 className="text-white font-bold mb-4 text-sm flex justify-between">
                                                                <span>{editingCert ? 'Edit Certificate' : 'Add Certificate'}</span>
                                                                {editingCert && <button onClick={() => { setEditingCert(null); setNewCert({ title: '', issuer: '', link: '', imageLink: '', priority: 0, tags: '' }); }} className="text-xs text-gray-400 hover:text-white">CANCEL</button>}
                                                            </h3>
                                                            <div className="grid gap-4">
                                                                <input placeholder="Title" value={newCert.title} onChange={e => setNewCert({ ...newCert, title: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />
                                                                <input placeholder="Issuer" value={newCert.issuer} onChange={e => setNewCert({ ...newCert, issuer: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />

                                                                <div className="grid grid-cols-2 gap-4">
                                                                    <input type="number" placeholder="Priority (0-100)" value={newCert.priority} onChange={e => setNewCert({ ...newCert, priority: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />
                                                                    <input placeholder="Tags (comma sep)" value={newCert.tags} onChange={e => setNewCert({ ...newCert, tags: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />
                                                                </div>

                                                                <input placeholder="Image URL" value={newCert.imageLink} onChange={e => setNewCert({ ...newCert, imageLink: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />
                                                                <input placeholder="Verify URL" value={newCert.link} onChange={e => setNewCert({ ...newCert, link: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />

                                                                <button onClick={saveCert} className={`py-3 rounded font-bold text-sm text-white transition-colors ${editingCert ? 'bg-blue-600 hover:bg-blue-500' : 'bg-green-700 hover:bg-green-600'}`}>
                                                                    {editingCert ? 'UPDATE' : 'ADD'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <div className="grid gap-2">
                                                            {certifications.map(c => (
                                                                <div key={c.id} className={`flex justify-between items-center bg-black p-3 border rounded ${editingCert === c.id ? 'border-blue-500' : 'border-gray-800'}`}>
                                                                    <div>
                                                                        <div className="text-white text-sm truncate max-w-[200px] font-bold">{c.title}</div>
                                                                        <div className="text-[10px] text-gray-500">P: {c.priority || 0} | Tags: {c.tags?.length || 0}</div>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => startEditCert(c)} className="text-blue-500"><Icons.Edit size={16} /></button>
                                                                        <button onClick={() => deleteDoc('certifications', c.id)} className="text-red-500"><Icons.Trash size={16} /></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {adminTab === 'tech' && (
                                                    <div className="space-y-6 max-w-2xl mx-auto">
                                                        <div className="bg-black border border-red-900 p-6 rounded-xl">
                                                            <h3 className="text-white font-bold mb-4 text-sm">Tech Stack (Comma Separated)</h3>
                                                            <textarea
                                                                rows="6"
                                                                defaultValue={techs.join(', ')}
                                                                onBlur={(e) => {
                                                                    const items = e.target.value.split(',').map(t => t.trim()).filter(Boolean);
                                                                    db.collection('techs').doc('list').set({ items }, { merge: true });
                                                                    setTechs(items);
                                                                }}
                                                                className="w-full bg-gray-900 border border-gray-700 p-4 text-white text-sm rounded focus:border-red-500 font-mono"
                                                                placeholder="React, Node.js, Firebase..."
                                                            />
                                                            <p className="text-xs text-gray-500 mt-2">Edit and click outside to save automatically.</p>
                                                        </div>
                                                    </div>
                                                )}

                                                {adminTab === 'exp' && (
                                                    <div className="space-y-6">
                                                        {experiences.length === 0 && (
                                                            <div className="bg-black border border-yellow-600 p-4 rounded-xl text-center">
                                                                <p className="text-yellow-500 text-sm mb-3">No experiences found in database. Load default roadmap?</p>
                                                                <button onClick={seedExperiences} className="bg-yellow-600 text-black px-4 py-2 rounded text-xs font-bold hover:bg-yellow-500">LOAD DEFAULT ROADMAP</button>
                                                            </div>
                                                        )}
                                                        <div className="bg-black border border-red-900 p-6 rounded-xl">
                                                            <h3 className="text-white font-bold mb-4 text-sm flex justify-between">
                                                                <span>{editingExp ? 'Edit Experience' : 'Add Experience'}</span>
                                                                {editingExp && <button onClick={() => { setEditingExp(null); setNewExperience({ year: '', title: '', company: '', desc: '' }); }} className="text-xs text-gray-400 hover:text-white">CANCEL</button>}
                                                            </h3>
                                                            <div className="grid gap-4">
                                                                <div className="grid md:grid-cols-3 gap-4">
                                                                    <div><input placeholder="Year" value={newExperience.year} onChange={e => setNewExperience({ ...newExperience, year: e.target.value })} className="w-full bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" /></div>
                                                                    <div className="md:col-span-2"><input placeholder="Title" value={newExperience.title} onChange={e => setNewExperience({ ...newExperience, title: e.target.value })} className="w-full bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" /></div>
                                                                </div>
                                                                <input placeholder="Company" value={newExperience.company} onChange={e => setNewExperience({ ...newExperience, company: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />
                                                                <textarea placeholder="Description" rows="3" value={newExperience.desc} onChange={e => setNewExperience({ ...newExperience, desc: e.target.value })} className="bg-gray-900 border border-gray-700 p-3 text-white text-sm rounded" />

                                                                <button onClick={async () => {
                                                                    if (editingExp) {
                                                                        await db.collection('experiences').doc(editingExp).update(newExperience);
                                                                    } else {
                                                                        await db.collection('experiences').add({ ...newExperience, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                                                                    }
                                                                    setNewExperience({ year: '', title: '', company: '', desc: '' });
                                                                    setEditingExp(null);
                                                                }} className={`py-3 rounded font-bold text-sm text-white transition-colors ${editingExp ? 'bg-blue-600 hover:bg-blue-500' : 'bg-green-700 hover:bg-green-600'}`}>
                                                                    {editingExp ? 'UPDATE' : 'ADD'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-2">
                                                            {experiences.map(e => (
                                                                <div key={e.id} className="flex justify-between items-center bg-black p-4 border border-gray-800 rounded-lg">
                                                                    <div>
                                                                        <div className="text-white font-bold text-sm">{e.title} <span className="text-gray-500 font-normal">at {e.company}</span></div>
                                                                        <div className="text-[10px] text-gray-500">{e.year}</div>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <button onClick={() => { setNewExperience(e); setEditingExp(e.id); }} className="p-2 bg-blue-900/30 text-blue-400 rounded hover:bg-blue-900"><Icons.Edit size={16} /></button>
                                                                        <button onClick={() => deleteDoc('experiences', e.id)} className="p-2 bg-red-900/30 text-red-400 rounded hover:bg-red-900"><Icons.Trash size={16} /></button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}



                                                {adminTab === 'inbox' && (
                                                    <div className="space-y-4">
                                                        {messages.map(m => (
                                                            <div key={m.id} className="bg-black border border-gray-800 p-5 rounded-lg hover:border-gray-600 transition-colors">
                                                                <div className="flex justify-between text-red-400 font-bold text-sm mb-2">
                                                                    <span className="flex items-center gap-2"><Icons.User size={14} /> {m.name}</span>
                                                                    <span className="text-gray-600 text-xs font-mono">{m.timestamp?.seconds ? new Date(m.timestamp.seconds * 1000).toLocaleString() : 'Just now'}</span>
                                                                </div>
                                                                <div className="flex gap-4 text-xs text-gray-500 mb-3 font-mono border-b border-gray-800 pb-2">
                                                                    <span>COMMS: {m.phone}</span>
                                                                    <span>TYPE: {m.inquiryType}</span>
                                                                </div>
                                                                <div className="p-3 bg-red-900/10 border-l-2 border-red-900 text-gray-300 text-sm leading-relaxed">
                                                                    {m.message}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )
                    }
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- PWA SERVICE WORKER REGISTRATION & INSTALL PROMPT ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Optionally, we could show a custom install button here.
            console.log('PWA installation prompt ready to be triggered.');
        });
    </script>
</body>

</html>
